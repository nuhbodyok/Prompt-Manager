<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Collection Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#5D5CDE',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-200 min-h-screen">
    <div class="container mx-auto px-3 py-4 max-w-6xl">
        <!-- Header -->
        <h1 class="text-3xl font-bold mb-4 text-primary dark:text-primary text-center mt-2">Prompt Collection Tool</h1>
        
        <!-- File Upload -->
        <div class="mb-4 p-3 border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-lg text-center hover:border-primary dark:hover:border-primary transition-colors">
            <label for="file-upload" class="cursor-pointer block py-2">
                <i class="fas fa-cloud-upload-alt text-3xl text-primary"></i>
                <span class="block">Drag and drop .txt files here or click to browse</span>
                <span class="text-sm text-gray-500 dark:text-gray-400">Only .txt files are accepted</span>
                <input id="file-upload" type="file" accept=".txt" multiple class="hidden" />
            </label>
        </div>
        
        <!-- Repository Controls -->
        <div class="mb-4 flex flex-wrap gap-3 items-center">
            <div class="flex items-center">
                <label for="sort-dropdown" class="mr-2 whitespace-nowrap">Sort by:</label>
                <select id="sort-dropdown" class="border border-gray-300 dark:border-gray-700 rounded p-2 bg-white dark:bg-gray-800">
                    <option value="alphabetical">Alphabetical (A-Z)</option>
                    <option value="reverse-alphabetical">Alphabetical (Z-A)</option>
                    <option value="date-imported">Date Imported (newest)</option>
                </select>
            </div>
            
            <div class="flex-grow min-w-[200px]">
                <input type="text" id="search-input" placeholder="Search prompts..." 
                    class="w-full border border-gray-300 dark:border-gray-700 rounded p-2 bg-white dark:bg-gray-800 text-base" />
            </div>
            
            <button id="export-btn" class="bg-primary hover:bg-primary/80 text-white rounded px-4 py-2">
                <i class="fas fa-file-export mr-1"></i> Export CSV
            </button>
            
            <button id="remove-duplicates-btn" class="bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 rounded px-4 py-2">
                <i class="fas fa-clone mr-1"></i> Remove Duplicates
            </button>
        </div>
        
        <!-- Repository Status -->
        <div class="text-sm text-gray-500 dark:text-gray-400 mb-4" id="repository-status">
            0 prompts in repository
        </div>
        
        <!-- Repository Display -->
        <div id="repository-container" class="border border-gray-300 dark:border-gray-700 rounded-lg overflow-hidden">
            <div id="repository-empty" class="py-6 text-center text-gray-500 dark:text-gray-400">
                <i class="fas fa-inbox text-3xl mb-1"></i>
                <p>Your repository is empty. Upload .txt files to get started.</p>
            </div>
            <div id="repository-list" class="hidden">
                <div class="flex flex-col gap-2 p-2">
                    <!-- Prompt items will be added here dynamically -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- Edit Modal -->
    <div id="edit-modal" class="fixed inset-0 bg-black bg-opacity-50 dark:bg-opacity-70 flex items-center justify-center z-50 hidden">
        <div class="bg-white dark:bg-gray-800 rounded-lg w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col">
            <div class="p-3 border-b border-gray-300 dark:border-gray-700 flex justify-between items-center">
                <h2 class="text-lg font-semibold">Edit Prompt</h2>
                <button id="close-modal-btn" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-3 flex-grow overflow-auto">
                <div class="mb-3">
                    <label for="edit-title" class="block mb-1 font-medium">Prompt Title</label>
                    <input type="text" id="edit-title" class="w-full border border-gray-300 dark:border-gray-700 rounded p-2 bg-white dark:bg-gray-800 text-base" />
                </div>
                <div>
                    <label for="edit-content" class="block mb-1 font-medium">Prompt Content</label>
                    <textarea id="edit-content" rows="12" class="w-full border border-gray-300 dark:border-gray-700 rounded p-2 bg-white dark:bg-gray-800 text-base resize-none"></textarea>
                </div>
            </div>
            <div class="p-3 border-t border-gray-300 dark:border-gray-700 flex justify-end">
                <button id="cancel-edit-btn" class="bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 rounded px-3 py-1 mr-2">
                    Cancel
                </button>
                <button id="save-edit-btn" class="bg-primary hover:bg-primary/80 text-white rounded px-3 py-1">
                    Save Changes
                </button>
            </div>
        </div>
    </div>
    
    <!-- Notification Toast -->
    <div id="notification" class="fixed bottom-4 right-4 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300">
        <span id="notification-message"></span>
    </div>
    
    <!-- Confirmation Dialog -->
    <div id="confirmation-dialog" class="fixed inset-0 bg-black bg-opacity-50 dark:bg-opacity-70 flex items-center justify-center z-50 hidden">
        <div class="bg-white dark:bg-gray-800 rounded-lg p-6 max-w-md w-full">
            <h3 id="confirmation-title" class="text-lg font-semibold mb-2">Confirm Action</h3>
            <p id="confirmation-message" class="mb-6 text-gray-600 dark:text-gray-300">Are you sure you want to proceed?</p>
            <div class="flex justify-end gap-3">
                <button id="confirmation-cancel" class="bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 rounded px-4 py-2">
                    Cancel
                </button>
                <button id="confirmation-confirm" class="bg-red-500 hover:bg-red-600 text-white rounded px-4 py-2">
                    Confirm
                </button>
            </div>
        </div>
    </div>
    
    <!-- Duplicate Handling Dialog -->
    <div id="duplicate-dialog" class="fixed inset-0 bg-black bg-opacity-50 dark:bg-opacity-70 flex items-center justify-center z-50 hidden">
        <div class="bg-white dark:bg-gray-800 rounded-lg p-6 max-w-md w-full">
            <h3 class="text-lg font-semibold mb-2">Duplicate Prompt Detected</h3>
            <p id="duplicate-message" class="mb-4 text-gray-600 dark:text-gray-300"></p>
            <div class="flex flex-col gap-2 mb-6">
                <button id="duplicate-skip" class="bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 rounded px-4 py-2 text-left">
                    Skip (don't import)
                </button>
                <button id="duplicate-overwrite" class="bg-yellow-500 hover:bg-yellow-600 text-white rounded px-4 py-2 text-left">
                    Overwrite existing prompt
                </button>
                <button id="duplicate-unique" class="bg-primary hover:bg-primary/80 text-white rounded px-4 py-2 text-left">
                    Add with unique suffix
                </button>
            </div>
        </div>
    </div>

    <script>
        // Dark mode detection
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
        
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
            if (event.matches) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        });
        
        // Main application
        document.addEventListener('DOMContentLoaded', function() {
            // Elements
            const fileUpload = document.getElementById('file-upload');
            const repositoryList = document.getElementById('repository-list');
            const repositoryEmpty = document.getElementById('repository-empty');
            const repositoryStatus = document.getElementById('repository-status');
            const sortDropdown = document.getElementById('sort-dropdown');
            const searchInput = document.getElementById('search-input');
            const exportBtn = document.getElementById('export-btn');
            const removeDuplicatesBtn = document.getElementById('remove-duplicates-btn');
            const editModal = document.getElementById('edit-modal');
            const closeModalBtn = document.getElementById('close-modal-btn');
            const editTitle = document.getElementById('edit-title');
            const editContent = document.getElementById('edit-content');
            const saveEditBtn = document.getElementById('save-edit-btn');
            const cancelEditBtn = document.getElementById('cancel-edit-btn');
            const notification = document.getElementById('notification');
            const notificationMessage = document.getElementById('notification-message');
            const confirmationDialog = document.getElementById('confirmation-dialog');
            const confirmationTitle = document.getElementById('confirmation-title');
            const confirmationMessage = document.getElementById('confirmation-message');
            const confirmationCancel = document.getElementById('confirmation-cancel');
            const confirmationConfirm = document.getElementById('confirmation-confirm');
            const duplicateDialog = document.getElementById('duplicate-dialog');
            const duplicateMessage = document.getElementById('duplicate-message');
            const duplicateSkip = document.getElementById('duplicate-skip');
            const duplicateOverwrite = document.getElementById('duplicate-overwrite');
            const duplicateUnique = document.getElementById('duplicate-unique');
            
            // State
            let repository = [];
            let currentEditIndex = -1;
            let duplicateHandlers = {
                resolve: null,
                reject: null,
                file: null
            };
            let confirmationCallback = null;
            
            // Functions
            function updateRepositoryDisplay() {
                if (repository.length === 0) {
                    repositoryEmpty.classList.remove('hidden');
                    repositoryList.classList.add('hidden');
                } else {
                    repositoryEmpty.classList.add('hidden');
                    repositoryList.classList.remove('hidden');
                }
                
                repositoryStatus.textContent = `${repository.length} prompt${repository.length === 1 ? '' : 's'} in repository`;
            }
            
            function addPromptToRepository(title, content, date = new Date()) {
                const prompt = {
                    title,
                    content,
                    date
                };
                
                repository.push(prompt);
                renderRepository();
                updateRepositoryDisplay();
                
                return repository.length - 1; // Return index of added prompt
            }
            
            function renderRepository() {
                // Get the list container
                const listContainer = repositoryList.querySelector('.flex.flex-col');
                listContainer.innerHTML = '';
                
                // Filter prompts based on search query
                const searchQuery = searchInput.value.toLowerCase();
                const filteredPrompts = repository.filter(prompt => 
                    prompt.title.toLowerCase().includes(searchQuery) || 
                    prompt.content.toLowerCase().includes(searchQuery)
                );
                
                // Sort prompts
                const sortMethod = sortDropdown.value;
                filteredPrompts.sort((a, b) => {
                    if (sortMethod === 'alphabetical') {
                        return a.title.localeCompare(b.title);
                    } else if (sortMethod === 'reverse-alphabetical') {
                        return b.title.localeCompare(a.title);
                    } else if (sortMethod === 'date-imported') {
                        return b.date - a.date;
                    }
                    return 0;
                });
                
                // Render each prompt as a list item
                filteredPrompts.forEach((prompt, index) => {
                    const repositoryIndex = repository.indexOf(prompt);
                    
                    // Create list item container
                    const item = document.createElement('div');
                    item.className = 'bg-white dark:bg-gray-800 rounded-md border border-gray-300 dark:border-gray-700 hover:shadow-md transition-shadow flex items-center p-2';
                    item.dataset.index = repositoryIndex;
                    
                    // Title
                    const titleSpan = document.createElement('span');
                    titleSpan.className = 'font-medium flex-grow truncate mr-4';
                    titleSpan.textContent = prompt.title;
                    
                    // Actions container
                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = 'flex items-center shrink-0';
                    
                    // View/Edit button
                    const viewButton = document.createElement('button');
                    viewButton.className = 'text-sm p-1.5 text-primary hover:bg-gray-100 dark:hover:bg-gray-700 rounded mr-2';
                    viewButton.innerHTML = '<i class="fas fa-eye"></i>';
                    viewButton.title = 'View/Edit';
                    viewButton.addEventListener('click', function(e) {
                        e.stopPropagation();
                        openEditModal(repositoryIndex);
                    });
                    
                    // Delete button
                    const deleteButton = document.createElement('button');
                    deleteButton.className = 'text-sm p-1.5 text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700 rounded';
                    deleteButton.innerHTML = '<i class="fas fa-trash-alt"></i>';
                    deleteButton.title = 'Delete';
                    deleteButton.addEventListener('click', function(e) {
                        e.stopPropagation();
                        showConfirmation(
                            'Delete Prompt',
                            `Are you sure you want to delete "${prompt.title}"?`,
                            () => {
                                repository.splice(repositoryIndex, 1);
                                renderRepository();
                                updateRepositoryDisplay();
                                showNotification('Prompt deleted successfully');
                            }
                        );
                    });
                    
                    actionsDiv.appendChild(viewButton);
                    actionsDiv.appendChild(deleteButton);
                    
                    // Assemble the list item
                    item.appendChild(titleSpan);
                    item.appendChild(actionsDiv);
                    
                    // Add click event to open the prompt for editing
                    item.addEventListener('click', function(e) {
                        if (!e.target.closest('button')) {
                            openEditModal(repositoryIndex);
                        }
                    });
                    
                    listContainer.appendChild(item);
                });
                
                // Update empty state if needed
                if (filteredPrompts.length === 0 && repository.length > 0) {
                    const emptyMessage = document.createElement('div');
                    emptyMessage.className = 'p-4 text-center text-gray-500 dark:text-gray-400';
                    emptyMessage.textContent = 'No matching prompts found';
                    listContainer.appendChild(emptyMessage);
                }
            }
            
            function openEditModal(index) {
                currentEditIndex = index;
                editTitle.value = repository[index].title;
                editContent.value = repository[index].content;
                editModal.classList.remove('hidden');
            }
            
            function closeEditModal() {
                editModal.classList.add('hidden');
                currentEditIndex = -1;
            }
            
            function showNotification(message) {
                notificationMessage.textContent = message;
                notification.classList.remove('translate-y-20', 'opacity-0');
                
                setTimeout(() => {
                    notification.classList.add('translate-y-20', 'opacity-0');
                }, 3000);
            }
            
            function showConfirmation(title, message, onConfirm) {
                confirmationTitle.textContent = title;
                confirmationMessage.textContent = message;
                confirmationCallback = onConfirm;
                confirmationDialog.classList.remove('hidden');
            }
            
            function closeConfirmation() {
                confirmationDialog.classList.add('hidden');
                confirmationCallback = null;
            }
            
            function handleDuplicatePrompt(filename) {
                return new Promise((resolve, reject) => {
                    duplicateHandlers.resolve = resolve;
                    duplicateHandlers.reject = reject;
                    duplicateHandlers.file = filename;
                    
                    duplicateMessage.textContent = `A prompt with the title "${filename}" already exists.`;
                    duplicateDialog.classList.remove('hidden');
                });
            }
            
            function closeDuplicateDialog() {
                duplicateDialog.classList.add('hidden');
                duplicateHandlers.resolve = null;
                duplicateHandlers.reject = null;
                duplicateHandlers.file = null;
            }
            
            function checkForDuplicate(title) {
                return repository.findIndex(prompt => prompt.title === title);
            }
            
            function createUniqueTitle(title) {
                let counter = 1;
                let newTitle = title;
                
                while (checkForDuplicate(newTitle) !== -1) {
                    newTitle = `${title} (${counter})`;
                    counter++;
                }
                
                return newTitle;
            }
            
            async function processFile(file) {
                const filename = file.name.replace(/\.txt$/, '');
                const content = await file.text();
                
                // Check if content is too large
                if (content.length > 10000) {
                    showNotification(`Warning: "${filename}" exceeds 10,000 characters limit`);
                }
                
                // Check for duplicate title
                const duplicateIndex = checkForDuplicate(filename);
                if (duplicateIndex !== -1) {
                    try {
                        const action = await handleDuplicatePrompt(filename);
                        
                        if (action === 'skip') {
                            return null;
                        } else if (action === 'overwrite') {
                            repository[duplicateIndex].content = content;
                            repository[duplicateIndex].date = new Date();
                            return duplicateIndex;
                        } else if (action === 'unique') {
                            const uniqueTitle = createUniqueTitle(filename);
                            return addPromptToRepository(uniqueTitle, content);
                        }
                    } catch (error) {
                        return null;
                    }
                } else {
                    return addPromptToRepository(filename, content);
                }
            }
            
            function handleFileUpload(files) {
                if (files.length === 0) return;
                
                const txtFiles = Array.from(files).filter(file => file.name.endsWith('.txt'));
                
                if (txtFiles.length === 0) {
                    showNotification('No .txt files were found');
                    return;
                }
                
                const processPromises = txtFiles.map(processFile);
                
                Promise.all(processPromises).then(results => {
                    const validResults = results.filter(result => result !== null);
                    showNotification(`${validResults.length} of ${txtFiles.length} files imported successfully`);
                    renderRepository();
                });
            }
            
            function showExportDialog() {
                if (repository.length === 0) {
                    showNotification('Repository is empty, nothing to export');
                    return;
                }
                
                // Create an export dialog
                const dialogElement = document.createElement('div');
                dialogElement.className = 'fixed inset-0 bg-black bg-opacity-50 dark:bg-opacity-70 flex items-center justify-center z-50';
                
                const dialogContent = document.createElement('div');
                dialogContent.className = 'bg-white dark:bg-gray-800 rounded-lg p-6 max-w-xl w-full';
                
                const dialogTitle = document.createElement('h3');
                dialogTitle.className = 'text-lg font-semibold mb-4';
                dialogTitle.textContent = 'Export Options';
                
                // Format selection
                const formatLabel = document.createElement('label');
                formatLabel.className = 'block mb-1 font-medium';
                formatLabel.textContent = 'Export Format:';
                
                const formatContainer = document.createElement('div');
                formatContainer.className = 'mb-4 flex gap-3';
                
                // CSV option
                const csvFormatLabel = document.createElement('label');
                csvFormatLabel.className = 'inline-flex items-center cursor-pointer';
                
                const csvRadio = document.createElement('input');
                csvRadio.type = 'radio';
                csvRadio.name = 'exportFormat';
                csvRadio.value = 'csv';
                csvRadio.checked = true;
                csvRadio.className = 'mr-2';
                
                csvFormatLabel.appendChild(csvRadio);
                csvFormatLabel.appendChild(document.createTextNode('CSV (Delimiter Separated)'));
                
                // JSON option
                const jsonFormatLabel = document.createElement('label');
                jsonFormatLabel.className = 'inline-flex items-center cursor-pointer';
                
                const jsonRadio = document.createElement('input');
                jsonRadio.type = 'radio';
                jsonRadio.name = 'exportFormat';
                jsonRadio.value = 'json';
                jsonRadio.className = 'mr-2';
                
                jsonFormatLabel.appendChild(jsonRadio);
                jsonFormatLabel.appendChild(document.createTextNode('JSON (Preserves Multi-line)'));
                
                formatContainer.appendChild(csvFormatLabel);
                formatContainer.appendChild(jsonFormatLabel);
                
                // CSV Delimiter option (initially visible)
                const csvOptionsContainer = document.createElement('div');
                csvOptionsContainer.id = 'csv-options';
                
                const delimiterLabel = document.createElement('label');
                delimiterLabel.className = 'block mb-1 font-medium';
                delimiterLabel.textContent = 'Choose delimiter character:';
                
                const delimiterInputContainer = document.createElement('div');
                delimiterInputContainer.className = 'flex gap-2 mb-1';
                
                const delimiterInput = document.createElement('input');
                delimiterInput.className = 'border border-gray-300 dark:border-gray-700 rounded p-2 bg-white dark:bg-gray-800 text-base flex-grow max-w-xs';
                delimiterInput.value = '|';
                delimiterInput.placeholder = 'Enter delimiter character';
                
                delimiterInputContainer.appendChild(delimiterInput);
                
                // Information message for CSV
                const infoMessage = document.createElement('p');
                infoMessage.className = 'text-sm text-gray-500 dark:text-gray-400 mb-4';
                infoMessage.textContent = 'Common delimiters: | (pipe), , (comma), ; (semicolon), \\t (tab)';
                
                csvOptionsContainer.appendChild(delimiterLabel);
                csvOptionsContainer.appendChild(delimiterInputContainer);
                csvOptionsContainer.appendChild(infoMessage);
                
                // JSON Options container (initially hidden)
                const jsonOptionsContainer = document.createElement('div');
                jsonOptionsContainer.id = 'json-options';
                jsonOptionsContainer.className = 'hidden';
                
                const jsonInfoMessage = document.createElement('p');
                jsonInfoMessage.className = 'text-sm text-gray-500 dark:text-gray-400 mb-4';
                jsonInfoMessage.textContent = 'JSON export preserves all line breaks and formatting in your prompts.';
                
                jsonOptionsContainer.appendChild(jsonInfoMessage);
                
                // Generate button
                const exportBtnContainer = document.createElement('div');
                exportBtnContainer.className = 'flex justify-end mb-4';
                
                const exportBtn = document.createElement('button');
                exportBtn.className = 'bg-primary hover:bg-primary/80 text-white rounded px-3 py-2';
                exportBtn.textContent = 'Generate Export';
                
                exportBtnContainer.appendChild(exportBtn);
                
                // Export content area (initially hidden)
                const exportContentArea = document.createElement('div');
                exportContentArea.className = 'hidden';
                
                const resultHeading = document.createElement('h4');
                resultHeading.className = 'font-medium mb-2';
                resultHeading.textContent = 'Export Result:';
                
                const copyContainer = document.createElement('div');
                copyContainer.className = 'flex justify-end mb-2';
                
                const copyButton = document.createElement('button');
                copyButton.className = 'bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-800 dark:text-gray-200 rounded px-3 py-1 text-sm';
                copyButton.innerHTML = '<i class="fas fa-copy mr-1"></i> Copy to Clipboard';
                
                const exportArea = document.createElement('textarea');
                exportArea.className = 'w-full p-2 border border-gray-300 dark:border-gray-700 rounded bg-white dark:bg-gray-800 text-sm font-mono h-48';
                exportArea.readOnly = true;
                
                copyContainer.appendChild(copyButton);
                exportContentArea.appendChild(resultHeading);
                exportContentArea.appendChild(copyContainer);
                exportContentArea.appendChild(exportArea);
                
                // Close button
                const closeContainer = document.createElement('div');
                closeContainer.className = 'flex justify-end mt-4';
                
                const closeButton = document.createElement('button');
                closeButton.className = 'bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 rounded px-4 py-2';
                closeButton.textContent = 'Close';
                
                closeContainer.appendChild(closeButton);
                
                // Assemble dialog
                dialogContent.appendChild(dialogTitle);
                dialogContent.appendChild(formatLabel);
                dialogContent.appendChild(formatContainer);
                dialogContent.appendChild(csvOptionsContainer);
                dialogContent.appendChild(jsonOptionsContainer);
                dialogContent.appendChild(exportBtnContainer);
                dialogContent.appendChild(exportContentArea);
                dialogContent.appendChild(closeContainer);
                dialogElement.appendChild(dialogContent);
                
                // Add dialog to body
                document.body.appendChild(dialogElement);
                
                // Format toggle event handlers
                csvRadio.addEventListener('change', () => {
                    if (csvRadio.checked) {
                        csvOptionsContainer.classList.remove('hidden');
                        jsonOptionsContainer.classList.add('hidden');
                    }
                });
                
                jsonRadio.addEventListener('change', () => {
                    if (jsonRadio.checked) {
                        jsonOptionsContainer.classList.remove('hidden');
                        csvOptionsContainer.classList.add('hidden');
                    }
                });
                
                // Event handlers
                closeButton.addEventListener('click', () => {
                    document.body.removeChild(dialogElement);
                });
                
                exportBtn.addEventListener('click', () => {
                    let exportContent = '';
                    
                    if (csvRadio.checked) {
                        const delimiter = delimiterInput.value || '|';
                        exportContent = generateCsvExport(delimiter);
                    } else {
                        exportContent = generateJsonExport();
                    }
                    
                    exportArea.value = exportContent;
                    exportContentArea.classList.remove('hidden');
                    showNotification('Export generated successfully');
                });
                
                copyButton.addEventListener('click', () => {
                    try {
                        navigator.clipboard.writeText(exportArea.value).then(() => {
                            showNotification('Content copied to clipboard');
                        });
                    } catch (err) {
                        showNotification('Failed to copy. Please select all and copy manually.');
                    }
                });
            }
            
            function generateCsvExport(delimiter) {
                // Default to pipe if no delimiter specified
                delimiter = delimiter || '|';
                
                // Escape special regex characters for replacement
                const escapedDelimiter = delimiter.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                
                let csvLines = [];
                
                repository.forEach(prompt => {
                    // Process title - escape the delimiter if it exists in the title
                    const safeTitle = prompt.title.replace(new RegExp(escapedDelimiter, 'g'), `\\${delimiter}`);
                    
                    // Process content - compress all whitespace including newlines
                    // First, replace all newlines and carriage returns with a single space
                    let processedContent = prompt.content.replace(/\r?\n/g, ' ');
                    // Then collapse multiple spaces into a single space
                    processedContent = processedContent.replace(/\s+/g, ' ');
                    // Escape the delimiter if it exists in the content
                    processedContent = processedContent.replace(new RegExp(escapedDelimiter, 'g'), `\\${delimiter}`);
                    
                    // Add this prompt as a single line
                    csvLines.push(`${safeTitle}${delimiter}${processedContent}`);
                });
                
                // Join all lines with newlines to create the CSV content
                return csvLines.join('\n');
            }
            
            function generateJsonExport() {
                // Create an array of prompt objects
                const jsonData = repository.map(prompt => ({
                    title: prompt.title,
                    content: prompt.content
                }));
                
                // Convert to pretty-printed JSON with 2-space indentation
                return JSON.stringify(jsonData, null, 2);
            }
            
            function exportRepository() {
                showExportDialog();
            }
            
            function removeDuplicates() {
                if (repository.length === 0) {
                    showNotification('Repository is empty, no duplicates to remove');
                    return;
                }
                
                // Find duplicates by title
                const uniqueTitles = new Set();
                const duplicates = [];
                
                repository.forEach((prompt, index) => {
                    if (uniqueTitles.has(prompt.title)) {
                        duplicates.push(index);
                    } else {
                        uniqueTitles.add(prompt.title);
                    }
                });
                
                if (duplicates.length === 0) {
                    showNotification('No duplicate prompts found');
                    return;
                }
                
                showConfirmation(
                    'Remove Duplicates',
                    `Found ${duplicates.length} duplicate prompt${duplicates.length === 1 ? '' : 's'}. Do you want to remove ${duplicates.length === 1 ? 'it' : 'them'}?`,
                    () => {
                        // Remove duplicates (in reverse order to not affect indices)
                        for (let i = duplicates.length - 1; i >= 0; i--) {
                            repository.splice(duplicates[i], 1);
                        }
                        
                        renderRepository();
                        updateRepositoryDisplay();
                        showNotification(`${duplicates.length} duplicate prompt${duplicates.length === 1 ? '' : 's'} removed`);
                    }
                );
            }
            
            // Close dropdown menus when clicking outside
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.dropdown-menu') && !e.target.closest('button')) {
                    document.querySelectorAll('.dropdown-menu').forEach(menu => {
                        menu.classList.add('hidden');
                    });
                }
            });
            
            // Event Listeners
            fileUpload.addEventListener('change', function(e) {
                handleFileUpload(e.target.files);
                // Reset the input to allow selecting the same files again
                this.value = '';
            });
            
            // Drag and drop
            const dropArea = fileUpload.parentElement.parentElement;
            
            dropArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.classList.add('border-primary', 'dark:border-primary');
            });
            
            dropArea.addEventListener('dragleave', function(e) {
                e.preventDefault();
                this.classList.remove('border-primary', 'dark:border-primary');
            });
            
            dropArea.addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('border-primary', 'dark:border-primary');
                
                handleFileUpload(e.dataTransfer.files);
            });
            
            // Repository controls
            sortDropdown.addEventListener('change', renderRepository);
            searchInput.addEventListener('input', renderRepository);
            exportBtn.addEventListener('click', exportRepository);
            removeDuplicatesBtn.addEventListener('click', removeDuplicates);
            
            // Edit modal
            closeModalBtn.addEventListener('click', closeEditModal);
            cancelEditBtn.addEventListener('click', closeEditModal);
            saveEditBtn.addEventListener('click', function() {
                if (currentEditIndex >= 0 && currentEditIndex < repository.length) {
                    repository[currentEditIndex].title = editTitle.value;
                    repository[currentEditIndex].content = editContent.value;
                    renderRepository();
                    closeEditModal();
                    showNotification('Prompt updated successfully');
                }
            });
            
            // Confirmation dialog
            confirmationCancel.addEventListener('click', closeConfirmation);
            confirmationConfirm.addEventListener('click', function() {
                if (typeof confirmationCallback === 'function') {
                    confirmationCallback();
                }
                closeConfirmation();
            });
            
            // Duplicate dialog
            duplicateSkip.addEventListener('click', function() {
                if (duplicateHandlers.resolve) {
                    duplicateHandlers.resolve('skip');
                }
                closeDuplicateDialog();
            });
            
            duplicateOverwrite.addEventListener('click', function() {
                if (duplicateHandlers.resolve) {
                    duplicateHandlers.resolve('overwrite');
                }
                closeDuplicateDialog();
            });
            
            duplicateUnique.addEventListener('click', function() {
                if (duplicateHandlers.resolve) {
                    duplicateHandlers.resolve('unique');
                }
                closeDuplicateDialog();
            });
            
            // Initialize repository display
            updateRepositoryDisplay();
        });
    </script>
</body>
</html>
