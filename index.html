<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Collection Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--primary:#5D5CDE}
        ::-webkit-scrollbar{width:8px}
        ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
        .dark ::-webkit-scrollbar-thumb{background:#475569}
        .dark ::-webkit-scrollbar-track{background:#1e293b}
        .prompt-selected{background-color:rgba(93,92,222,.1)!important;border-color:var(--primary)!important}
        .dark .prompt-selected{background-color:rgba(93,92,222,.2)!important}
        .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0}
    </style>
<base target="_blank">
</head>
<body class="bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-200 min-h-screen">
    <div class="container mx-auto px-2 py-3 max-w-6xl">
        <div class="flex justify-between items-center mb-3">
                <div class="w-10"></div>
                <h1 class="text-2xl font-bold text-center" style="color:var(--primary)">Prompt Collection Tool</h1>
                <button id="theme-toggle" class="w-10 h-10 rounded-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors" aria-label="Toggle dark mode">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block text-yellow-400"></i>
                </button>
            </div>

        <div id="drop-zone" class="mb-3 p-3 border-2 border-dashed border-gray-300 dark:border-gray-700 rounded text-center cursor-pointer hover:border-[var(--primary)] transition-colors">
            <label class="cursor-pointer block">
                <i class="fas fa-cloud-upload-alt text-2xl mb-1" style="color:var(--primary)"></i>
                <div class="text-sm text-gray-500">Drop .txt/.csv files or click to browse</div>
                <input id="file-upload" type="file" accept="text/plain,text/csv,.txt,.csv" multiple class="hidden"/>
            </label>
        </div>

        <div class="flex flex-wrap gap-2 mb-2 items-center">
            <select id="sort-dropdown" class="border rounded px-2 py-1 bg-white dark:bg-gray-800 text-sm">
                <option value="alphabetical">A-Z</option>
                <option value="reverse-alphabetical">Z-A</option>
                <option value="date-imported">Newest</option>
            </select>
            <label for="search-input" class="sr-only">Search prompts</label><input type="text" id="search-input" placeholder="Search..." class="flex-1 min-w-[120px] border rounded px-2 py-1 bg-white dark:bg-gray-800 text-sm" aria-label="Search prompts"/>
            <button id="new-prompt-btn" class="bg-green-600 text-white px-3 py-1 rounded text-sm hover:bg-green-700"><i class="fas fa-plus"></i> New</button>
            <button id="import-btn" class="bg-blue-600 text-white px-3 py-1 rounded text-sm hover:bg-blue-700"><i class="fas fa-file-import"></i> Import</button>
            <button id="export-btn" class="text-white px-3 py-1 rounded text-sm hover:opacity-90" style="background:var(--primary)"><i class="fas fa-download"></i> Export</button>
            <button id="format-all-btn" class="bg-orange-500 text-white px-3 py-1 rounded text-sm hover:bg-orange-600"><i class="fas fa-magic"></i> Format</button>
            <button id="dedupe-btn" class="bg-gray-500 text-white px-3 py-1 rounded text-sm hover:bg-gray-600"><i class="fas fa-compress"></i> Dedupe</button>
            <button id="clear-all-btn" class="bg-red-800 text-white px-3 py-1 rounded text-sm hover:bg-red-900"><i class="fas fa-trash"></i> Clear</button>
        </div>

        <div id="batch-controls" class="flex gap-2 mb-2 items-center hidden">
            <button id="select-all-btn" class="bg-gray-200 dark:bg-gray-700 px-2 py-1 rounded text-sm">Select All</button>
            <button id="clear-selection-btn" class="bg-gray-200 dark:bg-gray-700 px-2 py-1 rounded text-sm">Clear</button>
            <button id="batch-delete-btn" class="bg-red-600 text-white px-3 py-1 rounded text-sm hidden">Delete (<span id="batch-count">0</span>)</button>
            <span id="selection-status" class="text-xs text-gray-500"></span>
        </div>

        <div id="repository-status" class="text-xs text-gray-500 mb-2">0 prompts</div>

        <div id="repository-container" class="border rounded overflow-hidden">
            <div id="repository-empty" class="py-8 text-center text-gray-500">
                <i class="fas fa-inbox text-3xl mb-2"></i>
                <p class="text-sm">No prompts yet. Drop files or create new ones.</p>
            </div>
            <div id="repository-list" class="hidden divide-y divide-gray-200 dark:divide-gray-700"></div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
        <div class="bg-white dark:bg-gray-800 rounded-lg w-full max-w-2xl max-h-[90vh] flex flex-col m-4">
            <div class="p-3 border-b flex justify-between items-center">
                <h2 id="edit-modal-title" class="text-lg font-semibold">Edit Prompt</h2>
                <button id="close-modal-btn" class="text-gray-500 hover:text-gray-700 p-1"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-3 flex-grow overflow-auto">
                <label class="block text-sm font-medium mb-1">Title</label>
                <input type="text" id="edit-title" class="w-full border rounded p-2 mb-3 bg-white dark:bg-gray-700"/>
                <label class="block text-sm font-medium mb-1">Content</label>
                <textarea id="edit-content" rows="10" class="w-full border rounded p-2 bg-white dark:bg-gray-700 resize-none font-mono text-sm"></textarea>
                <div class="text-right text-xs text-gray-500 mt-1"><span id="content-char-count">0</span> characters</div>
            </div>
            <div class="p-3 border-t flex justify-end gap-2">
                <button id="cancel-edit-btn" class="bg-gray-200 dark:bg-gray-600 rounded px-4 py-1 text-sm">Cancel</button>
                <button id="save-edit-btn" class="text-white rounded px-4 py-1 text-sm hover:opacity-90" style="background:var(--primary)">Save</button>
            </div>
        </div>
    </div>

    <!-- Import Modal -->
    <div id="import-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden" role="dialog" aria-modal="true" aria-labelledby="import-modal-title">
        <div class="bg-white dark:bg-gray-800 rounded-lg w-full max-w-2xl max-h-[90vh] flex flex-col m-4">
            <div class="p-3 border-b flex justify-between items-center">
                <h2 id="import-modal-title" class="text-lg font-semibold">Import Prompts</h2>
                <button id="close-import-btn" class="text-gray-500 hover:text-gray-700 p-1"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-3 flex-grow overflow-auto">
                <div class="mb-3">
                    <label class="block text-sm font-medium mb-1">Paste CSV/Text</label>
                    <textarea id="paste-area" rows="6" class="w-full border rounded p-2 bg-white dark:bg-gray-700 resize-none text-sm font-mono" placeholder="Title,Content format or Title|Content..."></textarea>
                </div>
                <div class="mb-3 p-2 bg-gray-100 dark:bg-gray-700 rounded">
                    <div class="flex gap-2 items-center mb-1">
                        <label class="text-sm font-medium">Delimiter:</label>
                        <input type="text" id="csv-delimiter" value="," class="border rounded px-2 py-1 w-16 text-sm bg-white dark:bg-gray-600"/>
                        <button id="auto-detect-btn" class="bg-blue-500 text-white px-2 py-1 rounded text-sm hover:bg-blue-600">Auto-detect</button>
                    </div>
                    <div class="text-xs text-gray-500">Common: <code class="bg-gray-200 dark:bg-gray-600 px-1 rounded">,</code> <code class="bg-gray-200 dark:bg-gray-600 px-1 rounded">|</code> <code class="bg-gray-200 dark:bg-gray-600 px-1 rounded">;</code> <code class="bg-gray-200 dark:bg-gray-600 px-1 rounded">,"</code></div>
                </div>
                <div id="import-preview" class="hidden">
                    <div class="text-sm font-medium mb-2">Preview (<span id="preview-count">0</span> prompts):</div>
                    <div class="border rounded max-h-48 overflow-auto">
                        <table class="w-full text-xs">
                            <thead class="sticky top-0 bg-gray-100 dark:bg-gray-700"><tr><th class="p-2 text-left">Title</th><th class="p-2 text-left w-full">Content</th></tr></thead>
                            <tbody id="import-preview-table"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="p-3 border-t flex justify-end gap-2">
                <button id="cancel-import-btn" class="bg-gray-200 dark:bg-gray-600 rounded px-4 py-1 text-sm">Cancel</button>
                <button id="process-import-btn" class="text-white rounded px-4 py-1 text-sm hidden hover:opacity-90" style="background:var(--primary)">Import</button>
            </div>
        </div>
    </div>

    <!-- Confirm Dialog -->
    <div id="confirm-dialog" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden" role="alertdialog" aria-modal="true" aria-labelledby="confirm-title">
        <div class="bg-white dark:bg-gray-800 rounded-lg p-4 max-w-sm w-full m-4">
            <h3 id="confirm-title" class="text-lg font-semibold mb-2">Confirm</h3>
            <p id="confirm-message" class="mb-4 text-gray-600 dark:text-gray-300 text-sm"></p>
            <div class="flex justify-end gap-2">
                <button id="confirm-cancel" class="bg-gray-200 dark:bg-gray-600 rounded px-4 py-1 text-sm">Cancel</button>
                <button id="confirm-ok" class="bg-red-500 text-white rounded px-4 py-1 text-sm">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Duplicate Dialog -->
    <div id="dup-dialog" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden" role="dialog" aria-modal="true" aria-labelledby="dup-dialog-title">
        <div class="bg-white dark:bg-gray-800 rounded-lg p-4 max-w-sm w-full m-4">
            <h3 id="dup-dialog-title" class="text-lg font-semibold mb-2">Duplicate Found</h3>
            <p id="dup-message" class="mb-3 text-gray-600 dark:text-gray-300 text-sm"></p>
            <div class="flex flex-col gap-2">
                <button id="dup-skip" class="bg-gray-200 dark:bg-gray-600 rounded px-3 py-2 text-left text-sm hover:bg-gray-300">Skip</button>
                <button id="dup-overwrite" class="bg-yellow-500 text-white rounded px-3 py-2 text-left text-sm hover:bg-yellow-600">Overwrite</button>
                <button id="dup-rename" class="text-white rounded px-3 py-2 text-left text-sm hover:opacity-90" style="background:var(--primary)">Rename</button>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="fixed bottom-4 right-4 bg-gray-800 text-white px-4 py-2 rounded shadow-lg text-sm transform translate-y-20 opacity-0 transition-all duration-300" role="status" aria-live="polite"></div>

    <script>
        (() => {
            // Dark mode
            if (matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark');
            matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => document.documentElement.classList.toggle('dark', e.matches));

            const $ = id => document.getElementById(id);
            const STORAGE_KEY = 'promptCollectionData';
            const MAX_SIZE = 100000;

            // State
            let prompts = [];
            let selectedIndices = new Set();
            let currentEditIndex = -1;
            let importData = [];
            let dupResolve = null;
            let confirmCallback = null;
            let notifyTimeout = null;

            // DOM elements cache
            const els = {
                dropZone: $('drop-zone'),
                fileUpload: $('file-upload'),
                repositoryEmpty: $('repository-empty'),
                repositoryList: $('repository-list'),
                repositoryStatus: $('repository-status'),
                sortDropdown: $('sort-dropdown'),
                searchInput: $('search-input'),
                newPromptBtn: $('new-prompt-btn'),
                importBtn: $('import-btn'),
                exportBtn: $('export-btn'),
                formatAllBtn: $('format-all-btn'),
                dedupeBtn: $('dedupe-btn'),
                clearAllBtn: $('clear-all-btn'),
                batchControls: $('batch-controls'),
                selectAllBtn: $('select-all-btn'),
                clearSelectionBtn: $('clear-selection-btn'),
                batchDeleteBtn: $('batch-delete-btn'),
                batchCount: $('batch-count'),
                selectionStatus: $('selection-status'),
                editModal: $('edit-modal'),
                editModalTitle: $('edit-modal-title'),
                editTitle: $('edit-title'),
                editContent: $('edit-content'),
                contentCharCount: $('content-char-count'),
                closeModalBtn: $('close-modal-btn'),
                cancelEditBtn: $('cancel-edit-btn'),
                saveEditBtn: $('save-edit-btn'),
                importModal: $('import-modal'),
                closeImportBtn: $('close-import-btn'),
                cancelImportBtn: $('cancel-import-btn'),
                pasteArea: $('paste-area'),
                csvDelimiter: $('csv-delimiter'),
                autoDetectBtn: $('auto-detect-btn'),
                importPreview: $('import-preview'),
                previewCount: $('preview-count'),
                importPreviewTable: $('import-preview-table'),
                processImportBtn: $('process-import-btn'),
                confirmDialog: $('confirm-dialog'),
                confirmTitle: $('confirm-title'),
                confirmMessage: $('confirm-message'),
                confirmCancel: $('confirm-cancel'),
                confirmOk: $('confirm-ok'),
                dupDialog: $('dup-dialog'),
                dupMessage: $('dup-message'),
                dupSkip: $('dup-skip'),
                dupOverwrite: $('dup-overwrite'),
                dupRename: $('dup-rename'),
                notification: $('notification')
            };

            // Utility functions
            const escapeHTML = str => str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'\u0027'}[c]));
            const escapeRegex = str => str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

            const escapeCSV = (str, delim) => {
                const escaped = str.replace(/"/g, '""');
                return escaped.includes(delim) || escaped.includes('"') || escaped.includes('\n') 
                    ? `"${escaped}"` 
                    : escaped;
            };

            const formatContent = str => {
                let s = str.replace(/\\n/g, '\n').replace(/\\t/g, '\t').replace(/\\r/g, '').replace(/\\\\/g, '\\');
                s = s.replace(/^\*+/gm, m => '#'.repeat(m.length));
                s = s.replace(/\n{3,}/g, '\n\n').trim();
                return s;
            };

            const findDuplicate = title => prompts.findIndex(p => p.title.toLowerCase() === title.toLowerCase());

            const getUniqueTitle = title => {
                let n = 1, t = title;
                while (findDuplicate(t) !== -1) t = `${title} (${n++})`;
                return t;
            };

            const getUniqueTitleCI = title => {
                let n = 1, t = title;
                while (prompts.some(p => p.title.toLowerCase() === t.toLowerCase())) t = `${title} (${n++})`;
                return t;
            };

            // Notification (clears previous timeout)
            const notify = msg => {
                els.notification.textContent = msg;
                els.notification.classList.remove('translate-y-20', 'opacity-0');
                if (notifyTimeout) clearTimeout(notifyTimeout);
                notifyTimeout = setTimeout(() => els.notification.classList.add('translate-y-20', 'opacity-0'), 3000);
            };

            // Confirmation dialog
            const confirm = (title, msg, callback) => {
                els.confirmTitle.textContent = title;
                els.confirmMessage.textContent = msg;
                confirmCallback = callback;
                els.confirmDialog.classList.remove('hidden');
                els.confirmOk.focus();
            };

            // Duplicate resolution
            const handleDuplicate = title => {
                els.dupMessage.textContent = `"${title}" already exists.`;
                return new Promise(resolve => {
                    dupResolve = resolve;
                    els.dupDialog.classList.remove('hidden');
                });
            };

            // Modal controls
            const showModal = modal => modal.classList.remove('hidden');
            const hideModal = modal => modal.classList.add('hidden');

            // Storage
            const save = () => {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(prompts));
                    updateStatus();
                } catch (e) {
                    notify('Storage full!');
                }
            };

            const load = () => {
                try {
                    const data = localStorage.getItem(STORAGE_KEY);
                    if (data) {
                        prompts = JSON.parse(data).map(p => ({...p, date: new Date(p.date)}));
                        render();
                    }
                    updateStatus();
                } catch (e) {
                    console.error('Load error:', e);
                    prompts = [];
                }
            };

            // CSV parsing
            const parseCSV = (text, delim) => {
                const results = [];
                const lines = text.split(/\r?\n/).filter(l => l.trim());

                for (const row of lines) {
                    let idx = row.indexOf(delim);
                    let title, content;

                    if (idx === -1 && delim === ',') {
                        const fallback = row.includes('|"') ? '|"' : row.includes('|') ? '|' : null;
                        if (fallback) { idx = row.indexOf(fallback); delim = fallback; }
                    }

                    if (idx === -1) {
                        title = row.trim();
                        content = '';
                    } else {
                        title = row.substring(0, idx).trim();
                        content = row.substring(idx + delim.length).trim();
                        // Unwrap quotes and handle escaped quotes
                        if (content.startsWith('"') && content.endsWith('"')) {
                            content = content.slice(1, -1).replace(/""/g, '"');
                        }
                        if (title.startsWith('"') && title.endsWith('"')) {
                            title = title.slice(1, -1).replace(/""/g, '"');
                        }
                    }
                    results.push({title, content});
                }
                return results;
            };

            const autoDetectDelimiter = text => {
                const sample = text.split('\n').slice(0, 5).join('\n');
                const delims = ['|', ',"', ',', ';', '\t'];
                let best = ',', bestScore = 0;

                for (const d of delims) {
                    const valid = sample.split('\n').filter(l => {
                        const i = l.indexOf(d);
                        return i > 0 && i < l.length - 1;
                    }).length;
                    if (valid > bestScore) { bestScore = valid; best = d; }
                }
                return best;
            };

            // Import preview
            const showPreview = data => {
                importData = data;
                els.previewCount.textContent = data.length;
                els.importPreviewTable.innerHTML = data.slice(0, 5).map(p =>
                    `<tr class="border-t dark:border-gray-600"><td class="p-2">${escapeHTML(p.title.substring(0, 40))}</td><td class="p-2 text-gray-500">${escapeHTML(p.content.substring(0, 60))}...</td></tr>`
                ).join('');
                els.importPreview.classList.remove('hidden');
                els.processImportBtn.classList.remove('hidden');
            };

            const importPrompts = async data => {
                let imported = 0, skipped = 0;
                for (const p of data) {
                    const dup = findDuplicate(p.title);
                    if (dup !== -1) {
                        const action = await handleDuplicate(p.title);
                        els.dupDialog.classList.add('hidden');
                        if (action === 'skip') { skipped++; continue; }
                        if (action === 'overwrite') {
                            prompts[dup] = {...p, date: prompts[dup].date, modified: new Date()};
                            imported++;
                        } else {
                            prompts.push({...p, title: getUniqueTitle(p.title), date: new Date()});
                            imported++;
                        }
                    } else {
                        prompts.push({...p, date: new Date()});
                        imported++;
                    }
                }
                save();
                render();
                hideModal(els.importModal);
                notify(`Imported ${imported}${skipped ? `, skipped ${skipped}` : ''}`);
            };

            // Batch operations
            const updateBatchUI = () => {
                const count = selectedIndices.size;
                els.batchCount.textContent = count;
                els.batchDeleteBtn.classList.toggle('hidden', !count);
                els.selectionStatus.textContent = count ? `${count} selected` : '';
                els.selectAllBtn.textContent = count === prompts.length ? 'Deselect All' : 'Select All';
            };

            const toggleSelection = (idx, selected) => {
                selected ? selectedIndices.add(idx) : selectedIndices.delete(idx);
                updateBatchUI();
                const item = els.repositoryList.children[idx];
                if (item) {
                    item.classList.toggle('prompt-selected', selected);
                    const cb = item.querySelector('input[type="checkbox"]');
                    if (cb) cb.checked = selected;
                }
            };

            const selectAll = () => {
                if (selectedIndices.size === prompts.length) {
                    selectedIndices.clear();
                    Array.from(els.repositoryList.children).forEach(item => {
                        item.classList.remove('prompt-selected');
                        item.querySelector('input[type="checkbox"]').checked = false;
                    });
                } else {
                    prompts.forEach((_, i) => selectedIndices.add(i));
                    Array.from(els.repositoryList.children).forEach(item => {
                        item.classList.add('prompt-selected');
                        item.querySelector('input[type="checkbox"]').checked = true;
                    });
                }
                updateBatchUI();
            };

            const clearSelection = () => {
                selectedIndices.clear();
                Array.from(els.repositoryList.children).forEach(item => {
                    item.classList.remove('prompt-selected');
                    item.querySelector('input[type="checkbox"]').checked = false;
                });
                updateBatchUI();
            };

            const batchDelete = () => {
                const count = selectedIndices.size;
                if (!count) return;
                confirm('Delete Selected', `Delete ${count} prompts?`, () => {
                    Array.from(selectedIndices).sort((a, b) => b - a).forEach(i => prompts.splice(i, 1));
                    selectedIndices.clear();
                    save();
                    render();
                    notify(`${count} deleted`);
                });
            };

            // Filtering and sorting
            const getFiltered = () => {
                const q = els.searchInput.value.toLowerCase();
                let filtered = prompts.map((p, i) => ({...p, originalIndex: i})).filter(p =>
                    p.title.toLowerCase().includes(q) || p.content.toLowerCase().includes(q)
                );

                switch (els.sortDropdown.value) {
                    case 'alphabetical': filtered.sort((a, b) => a.title.localeCompare(b.title)); break;
                    case 'reverse-alphabetical': filtered.sort((a, b) => b.title.localeCompare(a.title)); break;
                    case 'date-imported': filtered.sort((a, b) => b.date - a.date); break;
                }
                return filtered;
            };

            const updateStatus = () => {
                const hasItems = prompts.length > 0;
                els.repositoryEmpty.classList.toggle('hidden', hasItems);
                els.repositoryList.classList.toggle('hidden', !hasItems);
                els.batchControls.classList.toggle('hidden', !hasItems);
                els.repositoryStatus.textContent = `${prompts.length} prompt${prompts.length !== 1 ? 's' : ''}`;
                updateBatchUI();
            };

            const render = () => {
                const filtered = getFiltered();
                els.repositoryList.innerHTML = filtered.map(p => {
                    const selected = selectedIndices.has(p.originalIndex);
                    return `<div class="bg-white dark:bg-gray-800 p-3 flex items-center gap-3 text-sm ${selected ? 'prompt-selected' : ''}" data-idx="${p.originalIndex}">
                        <input type="checkbox" class="w-4 h-4 rounded" ${selected ? 'checked' : ''} aria-label="Select ${escapeHTML(p.title)}">
                        <div class="flex-grow min-w-0 cursor-pointer" data-action="edit">
                            <div class="font-medium truncate">${escapeHTML(p.title)}</div>
                            <div class="text-xs text-gray-500 truncate">${escapeHTML(p.content.substring(0, 60))}${p.content.length > 60 ? '...' : ''}</div>
                        </div>
                        <button class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded text-xs" data-action="edit" style="color:var(--primary)" aria-label="Edit prompt"><i class="fas fa-edit"></i></button>
                        <button class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded text-xs text-red-500" data-action="delete" aria-label="Delete prompt"><i class="fas fa-trash-alt"></i></button>
                    </div>`;
                }).join('');
                updateBatchUI();
            };

            // CRUD operations
            const openEdit = idx => {
                currentEditIndex = idx;
                const p = idx >= 0 ? prompts[idx] : {title: '', content: ''};
                els.editModalTitle.textContent = idx >= 0 ? 'Edit Prompt' : 'New Prompt';
                els.editTitle.value = p.title;
                els.editContent.value = p.content;
                els.contentCharCount.textContent = p.content.length;
                showModal(els.editModal);
                els.editTitle.focus();
            };

            const saveEdit = () => {
                const title = els.editTitle.value.trim();
                const content = els.editContent.value;
                if (!title) return notify('Title required');
                if (content.length > MAX_SIZE) return notify('Content too long');

                if (currentEditIndex >= 0) {
                    prompts[currentEditIndex] = {...prompts[currentEditIndex], title, content, modified: new Date()};
                } else {
                    const dup = findDuplicate(title);
                    if (dup !== -1) return notify('Title exists');
                    prompts.push({title, content, date: new Date()});
                }
                save();
                render();
                hideModal(els.editModal);
                notify('Saved');
            };

            const deletePrompt = idx => {
                confirm('Delete Prompt', `Delete "${prompts[idx].title}"?`, () => {
                    prompts.splice(idx, 1);
                    selectedIndices.delete(idx);
                    save();
                    render();
                    notify('Deleted');
                });
            };

            // Export
            const exportPrompts = (data = prompts) => {
                if (!data.length) return notify('Nothing to export');
                const delim = els.csvDelimiter.value || ',';
                const csv = data.map(p => `${escapeCSV(p.title, delim)}${delim}"${escapeCSV(p.content, delim)}"`).join('\n');
                downloadFile(csv, 'prompts.csv', 'text/csv');
                notify(`Exported ${data.length}`);
            };

            const downloadFile = (content, filename, type) => {
                const blob = new Blob([content], {type});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
            };

            // Event listeners
            // Drag and drop
            ['dragover', 'dragleave', 'drop'].forEach(evt => {
                els.dropZone.addEventListener(evt, e => {
                    e.preventDefault();
                    els.dropZone.classList.toggle('border-[var(--primary)]', evt === 'dragover');
                    if (evt === 'drop') {
                        els.dropZone.classList.remove('border-[var(--primary)]');
                        els.fileUpload.files = e.dataTransfer.files;
                        handleFileUpload();
                    }
                });
            });

            els.fileUpload.addEventListener('change', handleFileUpload);

            const handleFileUpload = async () => {
                for (const file of Array.from(els.fileUpload.files)) {
                    if (file.size > MAX_SIZE) { notify(`"${file.name}" too large`); continue; }
                    try {
                        const text = await file.text();
                        const name = file.name.replace(/\.(txt|csv)$/i, '');
                        const data = file.name.endsWith('.csv') ? parseCSV(text, els.csvDelimiter.value || ',') : [{title: name, content: formatContent(text)}];

                        for (const p of data) {
                            const dup = findDuplicate(p.title);
                            if (dup !== -1) {
                                const action = await handleDuplicate(p.title);
                                els.dupDialog.classList.add('hidden');
                                if (action === 'skip') continue;
                                if (action === 'overwrite') prompts[dup] = {...p, date: prompts[dup].date, modified: new Date()};
                                else prompts.push({...p, title: getUniqueTitle(p.title), date: new Date()});
                            } else {
                                prompts.push({...p, date: new Date()});
                            }
                        }
                    } catch (e) { notify('Error reading file'); }
                }
                els.fileUpload.value = '';
                save();
                render();
            };

            // List item actions (delegated)
            els.repositoryList.addEventListener('click', e => {
                const row = e.target.closest('[data-idx]');
                if (!row) return;
                const idx = parseInt(row.dataset.idx);
                if (e.target.closest('[data-action="edit"]')) openEdit(idx);
                else if (e.target.closest('[data-action="delete"]')) deletePrompt(idx);
            });

            els.repositoryList.addEventListener('change', e => {
                if (e.target.type === 'checkbox') {
                    toggleSelection(parseInt(e.target.closest('[data-idx]').dataset.idx), e.target.checked);
                }
            });

            // Buttons
            els.newPromptBtn.addEventListener('click', () => openEdit(-1));
            els.importBtn.addEventListener('click', () => {
                importData = [];
                els.pasteArea.value = '';
                els.importPreview.classList.add('hidden');
                els.processImportBtn.classList.add('hidden');
                showModal(els.importModal);
            });
            els.exportBtn.addEventListener('click', () => exportPrompts());
            els.formatAllBtn.addEventListener('click', () => {
                if (!prompts.length) return notify('Empty');
                let count = 0;
                prompts.forEach(p => {
                    const formatted = formatContent(p.content);
                    if (formatted !== p.content) { p.content = formatted; p.modified = new Date(); count++; }
                });
                if (count) { save(); render(); notify(`Formatted ${count}`); }
                else notify('No changes needed');
            });
            els.dedupeBtn.addEventListener('click', () => {
                const seen = new Set(), dups = [];
                prompts.forEach((p, i) => { if (seen.has(p.title.toLowerCase())) dups.push(i); else seen.add(p.title.toLowerCase()); });
                if (!dups.length) return notify('No duplicates');
                confirm('Remove Duplicates', `Remove ${dups.length} duplicates?`, () => {
                    dups.reverse().forEach(i => prompts.splice(i, 1));
                    selectedIndices.clear();
                    save();
                    render();
                    notify('Duplicates removed');
                });
            });
            els.clearAllBtn.addEventListener('click', () => {
                if (!prompts.length) return notify('Empty');
                confirm('Clear All', `Delete all ${prompts.length} prompts?`, () => {
                    prompts = [];
                    selectedIndices.clear();
                    save();
                    render();
                    notify('Cleared');
                });
            });

            // Batch controls
            els.selectAllBtn.addEventListener('click', selectAll);
            els.clearSelectionBtn.addEventListener('click', clearSelection);
            els.batchDeleteBtn.addEventListener('click', batchDelete);

            // Edit modal
            els.closeModalBtn.addEventListener('click', () => hideModal(els.editModal));
            els.cancelEditBtn.addEventListener('click', () => hideModal(els.editModal));
            els.saveEditBtn.addEventListener('click', saveEdit);
            els.editContent.addEventListener('input', () => els.contentCharCount.textContent = els.editContent.value.length);
            els.editModal.addEventListener('keydown', e => { if (e.key === 'Escape') hideModal(els.editModal); });
            els.dupDialog.addEventListener('keydown', e => {
                if (e.key === 'Escape') {
                    e.preventDefault();
                    if (dupResolve) { dupResolve('skip'); dupResolve = null; }
                    hideModal(els.dupDialog);
                }
            });

            // Import modal
            els.closeImportBtn.addEventListener('click', () => hideModal(els.importModal));
            els.cancelImportBtn.addEventListener('click', () => hideModal(els.importModal));
            els.autoDetectBtn.addEventListener('click', () => {
                const text = els.pasteArea.value.trim();
                if (!text) return notify('Paste content first');
                const d = autoDetectDelimiter(text);
                els.csvDelimiter.value = d;
                showPreview(parseCSV(text, d));
                notify(`Detected: "${d}"`);
            });
            els.pasteArea.addEventListener('input', () => {
                const text = els.pasteArea.value.trim();
                if (!text) return;
                let delim = els.csvDelimiter.value;
                if (delim === ',' && text.includes('|"')) { delim = '|"'; els.csvDelimiter.value = delim; }
                showPreview(parseCSV(text, delim));
            });
            els.processImportBtn.addEventListener('click', () => importPrompts(importData));

            // Dialogs
            els.confirmCancel.addEventListener('click', () => hideModal(els.confirmDialog));
            els.confirmOk.addEventListener('click', () => { if (confirmCallback) confirmCallback(); hideModal(els.confirmDialog); });

            els.dupSkip.addEventListener('click', () => dupResolve('skip'));
            els.dupOverwrite.addEventListener('click', () => dupResolve('overwrite'));
            els.dupRename.addEventListener('click', () => dupResolve('rename'));

            // Search and sort
            els.sortDropdown.addEventListener('change', render);
            els.searchInput.addEventListener('input', render);

            // Theme toggle
            els.themeToggle = $('theme-toggle');
            if (els.themeToggle) {
                els.themeToggle.addEventListener('click', () => {
                    document.documentElement.classList.toggle('dark');
                });
            }

            // Keyboard shortcuts
            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') {
                    if (!els.editModal.classList.contains('hidden')) hideModal(els.editModal);
                    if (!els.importModal.classList.contains('hidden')) hideModal(els.importModal);
                    if (!els.confirmDialog.classList.contains('hidden')) hideModal(els.confirmDialog);
                    if (!els.dupDialog.classList.contains('hidden')) hideModal(els.dupDialog);
                }
                if (e.ctrlKey && e.key === 'n') { e.preventDefault(); openEdit(-1); }
                if (e.ctrlKey && e.key === 'f') { e.preventDefault(); els.searchInput.focus(); }
            });

            load();
        })();
    </script>
</body>
</html>
